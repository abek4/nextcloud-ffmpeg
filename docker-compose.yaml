volumes:
  loslimones-nextcloud:
  loslimones-db:

networks:
  backend:
    external: true
    name: backend-nextcloud
  db-network:

services:
  db:
    image: mariadb:10.6
    restart: always
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW --log-bin-trust-function-creators=1
    volumes:
      - loslimones-db:/var/lib/mysql
    networks:
      - db-network
    environment:
      - MYSQL_ROOT_PASSWORD=
      - MYSQL_PASSWORD=
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud

  app:
    build: .
    image: nextcloud-ffmpeg
    restart: always
    ports:
      - 8080:80
    links:
      - db
    volumes:
      - loslimones-nextcloud:/var/www/html
    networks:
      - backend
      - db-network
    environment:
      - MYSQL_PASSWORD=
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=db
